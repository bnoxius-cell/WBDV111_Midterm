<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Medical Staff - HealthSync</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="navbar-placeholder"></div>

    <div class="page-container">
        <h1>Our Medical Staff</h1>
        <p style="margin-bottom: 2rem;">Meet our board-certified physicians and specialists.</p>

        <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 2rem;">
            <div class="clinic-card" style="text-align: center;">
                <div style="width: 100px; height: 100px; border-radius: 50%; background: var(--border-light); margin: 0 auto 1rem auto; overflow: hidden;">
                    <img src="https://images.unsplash.com/photo-1559839734-2b71ea197ec2?w=200&q=80" alt="Dr. Chen" style="width: 100%; height: 100%; object-fit: cover;">
                </div>
                <h3>Dr. Emily Chen, MD</h3>
                <p style="color: var(--trust-blue); font-weight: 600; font-size: 0.9rem;">General Practice</p>
                <p style="font-size: 0.85rem; margin-top: 0.5rem;">NYU Grossman School of Medicine</p>
            </div>

            <div class="clinic-card" style="text-align: center;">
                <div style="width: 100px; height: 100px; border-radius: 50%; background: var(--border-light); margin: 0 auto 1rem auto; overflow: hidden;">
                    <img src="https://images.unsplash.com/photo-1612349317150-e413f6a5b16d?w=200&q=80" alt="Dr. Webb" style="width: 100%; height: 100%; object-fit: cover;">
                </div>
                <h3>Dr. Marcus Webb, MD</h3>
                <p style="color: var(--trust-blue); font-weight: 600; font-size: 0.9rem;">Cardiology</p>
                <p style="font-size: 0.85rem; margin-top: 0.5rem;">Johns Hopkins University</p>
            </div>
            
            <div class="clinic-card" style="text-align: center;">
                <div style="width: 100px; height: 100px; border-radius: 50%; background: var(--border-light); margin: 0 auto 1rem auto; overflow: hidden;">
                    <img src="https://images.unsplash.com/photo-1594824436998-d1420790eb3e?w=200&q=80" alt="Dr. Davis" style="width: 100%; height: 100%; object-fit: cover;">
                </div>
                <h3>Dr. Sarah Jenkins, DO</h3>
                <p style="color: var(--trust-blue); font-weight: 600; font-size: 0.9rem;">Pediatrics</p>
                <p style="font-size: 0.85rem; margin-top: 0.5rem;">Stanford Medicine</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
