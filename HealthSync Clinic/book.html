<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Book Appointment - HealthSync</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="navbar-placeholder"></div>

    <div class="page-container wizard-container">
        <div class="wizard-progress">
            <div class="progress-dot active" id="dot-1"></div>
            <div class="progress-dot" id="dot-2"></div>
            <div class="progress-dot" id="dot-3"></div>
            <div class="progress-dot" id="dot-4"></div>
        </div>

        <!-- STEP 1: Select Specialty -->
        <div id="step-1" class="wizard-step active">
            <h2>Select Specialty</h2>
            <p>What type of care do you need today?</p>
            <div class="wizard-options">
                <button class="wizard-option-btn" onclick="nextStep(2, 'Cardiology')">
                    Cardiology <span class="sub-text">Heart & Blood Pressure</span>
                </button>
                <button class="wizard-option-btn" onclick="nextStep(2, 'General Practice')">
                    General Practice <span class="sub-text">Routine Checkups & Illness</span>
                </button>
                <button class="wizard-option-btn" onclick="nextStep(2, 'Dermatology')">
                    Dermatology <span class="sub-text">Skin, Hair & Nails</span>
                </button>
            </div>
        </div>

        <!-- STEP 2: Pick Doctor -->
        <div id="step-2" class="wizard-step">
            <h2>Pick a Provider</h2>
            <p>Select an available doctor for your chosen specialty.</p>
            <div class="wizard-options">
                <button class="wizard-option-btn" onclick="nextStep(3, 'Dr. Sarah Jenkins')">
                    Dr. Sarah Jenkins <span class="sub-text">Available this week</span>
                </button>
                <button class="wizard-option-btn" onclick="nextStep(3, 'Dr. Marcus Webb')">
                    Dr. Marcus Webb <span class="sub-text">Available next week</span>
                </button>
                <button class="btn btn-outline" style="margin-top: 1rem; width: 100%; padding: 14px;" onclick="nextStep(1)">Back</button>
            </div>
        </div>

        <!-- STEP 3: Choose Time -->
        <div id="step-3" class="wizard-step">
            <h2>Choose a Time</h2>
            <p>Select an available time slot.</p>
            <div class="wizard-options">
                <button class="wizard-option-btn" onclick="nextStep(4, 'Oct 24 - 10:00 AM')">
                    Oct 24, 2024 <span class="sub-text">10:00 AM</span>
                </button>
                <button class="wizard-option-btn" onclick="nextStep(4, 'Oct 25 - 2:30 PM')">
                    Oct 25, 2024 <span class="sub-text">2:30 PM</span>
                </button>
                <button class="btn btn-outline" style="margin-top: 1rem; width: 100%; padding: 14px;" onclick="nextStep(2)">Back</button>
            </div>
        </div>

        <!-- STEP 4: Confirm -->
        <div id="step-4" class="wizard-step">
            <h2>Confirm Appointment</h2>
            <p>Review your selection before finalizing.</p>
            <div class="clinic-card" style="text-align: left; margin: 2rem 0;">
                <p><strong>Status:</strong> Pending Confirmation</p>
                <p><strong>Facility:</strong> Main Campus</p>
            </div>
            <button class="btn btn-primary" style="width: 100%; font-size: 1.1rem; padding: 14px;" onclick="confirmAppointment()">Confirm Appointment</button>
            <button class="btn btn-outline" style="margin-top: 1rem; width: 100%; padding: 14px;" onclick="nextStep(3)">Back</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
