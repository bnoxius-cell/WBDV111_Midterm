<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Register</title>
  <link rel="stylesheet" href="./index.css">
</head>
<body>

<header class="navbar">
  <div class="logo">
    <img src="./assets/images/logo.png">
    VibeStream Pro
  </div>
</header>

<div class="auth-wrapper">
  <div class="auth-card">
    <h1>Create Account</h1>

    <input type="text" class="auth-input" placeholder="Username">
    <input type="email" class="auth-input" placeholder="Email">
    <input type="password" class="auth-input" placeholder="Password">
    <input type="password" class="auth-input" placeholder="Confirm Password">

    <button class="auth-btn">Register</button>

    <p>Already have an account? <a href="./login.html">Login</a></p>
  </div>
</div>
</body>
</html>
