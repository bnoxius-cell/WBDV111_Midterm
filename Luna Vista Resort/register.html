<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="login.css">
    <title>Register - Luna Vista Resort</title>
</head>
<body>
    <header class="nav-bar">
        <div class="logo"><a href="index.html">Luna Vista Resort</a></div>
        <div class="nav-items">
            <a href="rooms.html">Rooms</a>
            <a href="dates.html">Dates</a>
            <a href="booking.html">Booking</a>
            <a href="itinerary.html">Itinerary</a>
            <a href="login.html" class="login">Login</a>
        </div>
    </header>
    <video autoplay muted loop playsinline width="600">
        <source src="assets/videos/resort1.mp4" type="video/mp4">
        Your browser does not support the video tag.
    </video>
    <div class="login-container">
        <h1>Register</h1>
        <form action="index.html">
            <div class="email">
                <label for="email">E-mail</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="password">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
                <label for="confirm-password" style="margin-top: 10px;">Confirm Password</label>
                <input type="password" id="confirm-password" name="confirm-password" required>
            </div>
            <button type="submit" class="btn-login">Register</button>
            <div class="register-link">
                <p>Already have an account? <a href="login.html">Login here</a></p>
            </div>
        </form>
    </div>
</body>
</html>
