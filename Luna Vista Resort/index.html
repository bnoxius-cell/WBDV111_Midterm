<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Home - Luna Vista Resort</title>
</head>
<body>
    <header class="nav-bar">
        <div class="logo"><a href="index.html">Luna Vista Resort</a></div>
        <div class="nav-items">
            <a href="rooms.html">Rooms</a>
            <a href="dates.html">Dates</a>
            <a href="booking.html">Booking</a>
            <a href="itinerary.html">Itinerary</a>
            <a href="login.html" class="login">Login</a>
        </div>
    </header>   
    
    <div class="hero-section">
        <div class="slider">
            <div class="slides">
                <img src="assets/images/image1.jpg" class="slide active">
                <img src="assets/images/image2.jpg" class="slide">
                <img src="assets/images/image3.jpg" class="slide">
            </div>

            <div class="overlay">
                <div class="booking-form-container">
                    <h1>Escape the Ordinary</h1>
                    <p>Relax, unwind, and rediscover what peace feels like.</p>
                    <form class="booking-form" action="booking.html">
                        <div class="form-group">
                            <label for="checkin">Input Dates</label>
                            <input type="date" id="checkin" name="checkin" required>
                            <input type="date" id="checkout" name="checkout" required>
                        </div>
                        <div class="form-group">
                            <label for="room-type">Filter Room Type</label>
                            <select id="room-type" name="room-type">
                                <option value="ocean">Ocean View Suite</option>
                                <option value="villa">Private Villa</option>
                                <option value="standard">Standard Room</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="amenities">Add Amenities</label>
                            <select id="amenities" name="amenities" multiple>
                                <option value="spa">Spa Access</option>
                                <option value="cabana">Private Cabana</option>
                                <option value="dining">All-Inclusive Dining</option>
                            </select>
                        </div>
                        <button type="submit" class="btn-checkin">Check-in Online</button>
                    </form>
                </div>
            </div>

            <button class="prev">&#10094;</button>
            <button class="next">&#10095;</button>
        </div>
    </div>
    <script src="slider.js"></script>
</body>
</html>
