<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Booking - Luna Vista Resort</title>

<style>
@import url('https://fonts.cdnfonts.com/css/satoshi');
* {
    text-decoration: none;
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

a {
    color: black;
    font-family: 'Satoshi';
    font-weight: 400; 
    font-size: 1.15rem;
}

.nav-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    height: 70px;
    padding: 7px 15px;
}

.nav-bar .nav-items {
    gap: 60px;
}

.nav-bar .logo a {
    background: linear-gradient(113deg, rgba(112, 217, 255, 1) 0%, rgba(121, 87, 199, 1) 50%, rgba(0, 255, 68, 1) 100%);
    background-clip: text; 
    color: transparent;
    padding-left: 90px;
}

.nav-items a {
    padding: 7px 15px;
}

.nav-items .login {
    border: 2px solid black;
    margin-right: 120px;
    border-radius: 6px;
}

.nav-bar .logo a{
    font-size:20px;
    font-weight:bold;
}

.container{
    max-width:900px;
    margin:50px auto;
    background:white;
    padding:40px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h1{
    margin-bottom:25px;
}

.form-section{
    margin-bottom:35px;
}

label{
    display:block;
    margin-bottom:5px;
    font-weight:bold;
}

input, select{
    width:100%;
    padding:10px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:5px;
}

.row{
    display:flex;
    gap:20px;
}

.row div{
    flex:1;
}

button{
    width:100%;
    padding:15px;
    background:#000;
    color:white;
    border:none;
    font-size:16px;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#333;
}

.payment-box{
    background:#fafafa;
    padding:20px;
    border-radius:8px;
}
</style>
</head>

<body>

<header class="nav-bar">
    <div class="logo"><a href="/index.html">Luna Vista Resort</a></div>
    <div class="nav-items">
        <a href="rooms.html">Rooms</a>
        <a href="">Dates</a>
        <a href="/booking.html">Booking</a>
        <a href="/login.html" class="login">Login</a>
    </div>
</header>   

<div class="container">

<h1>Resort Booking</h1>

<form>

<div class="form-section">
<h2>Guest Information</h2>

<label>Full Name</label>
<input type="text" placeholder="Enter your full name" required>

<label>Email Address</label>
<input type="email" placeholder="Enter your email" required>

<label>Phone Number</label>
<input type="tel" placeholder="Enter your phone number">

</div>

<div class="form-section">
<h2>Booking Details</h2>

<div class="row">
<div>
<label>Check-in Date</label>
<input type="date" required>
</div>

<div>
<label>Check-out Date</label>
<input type="date" required>
</div>
</div>

<label>Room Type</label>
<select required>
<option value="">Select Room</option>
<option>Standard Room</option>
<option>Deluxe Room</option>
<option>Ocean View Suite</option>
<option>Family Villa</option>
</select>

<label>Number of Guests</label>
<select>
<option>1 Guest</option>
<option>2 Guests</option>
<option>3 Guests</option>
<option>4 Guests</option>
</select>

</div>

<div class="form-section payment-box">
<h2>Payment Information</h2>

<label>Name on Card</label>
<input type="text" placeholder="Cardholder name" required>

<label>Card Number</label>
<input type="text" placeholder="1234 5678 9012 3456" required>

<div class="row">
<div>
<label>Expiry Date</label>
<input type="month" required>
</div>

<div>
<label>CVV</label>
<input type="password" placeholder="123" required>
</div>
</div>

</div>

<button type="submit">Confirm Booking</button>

</form>

</div>

</body>
</html>
