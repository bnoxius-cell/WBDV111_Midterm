<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Booking - Luna Vista Resort</title>

<link rel="stylesheet" href="styles.css">
<style>
body {
    background: #f4f4f4;
    font-family: Arial, Helvetica, sans-serif;
}

.nav-bar {
    background: rgba(0, 0, 0, 0.8); /* Solid background to overlay the page nicely */
}

.container{
    max-width:900px;
    margin: 120px auto 50px auto; /* 120px clears the 80px absolute navbar */
    background:white;
    padding:40px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h1{
    margin-bottom:25px;
}

.form-section{
    margin-bottom:35px;
}

label{
    display:block;
    margin-bottom:5px;
    font-weight:bold;
}

input, select{
    width:100%;
    padding:10px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:5px;
}

.row{
    display:flex;
    gap:20px;
}

.row div{
    flex:1;
}

button{
    width:100%;
    padding:15px;
    background:#000;
    color:white;
    border:none;
    font-size:16px;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#333;
}

.payment-box{
    background:#fafafa;
    padding:20px;
    border-radius:8px;
}
</style>
</head>

<body>

<header class="nav-bar">
    <div class="logo"><a href="index.html">Luna Vista Resort</a></div>
    <div class="nav-items">
        <a href="rooms.html">Rooms</a>
        <a href="dates.html">Dates</a>
        <a href="booking.html">Booking</a>
        <a href="itinerary.html">Itinerary</a>
        <a href="login.html" class="login">Login</a>
    </div>
</header>   

<div class="container">

<h1>Resort Booking</h1>

<form>

<div class="form-section">
<h2>Guest Information</h2>

<label>Full Name</label>
<input type="text" placeholder="Enter your full name" required>

<label>Email Address</label>
<input type="email" placeholder="Enter your email" required>

<label>Phone Number</label>
<input type="tel" placeholder="Enter your phone number">

</div>

<div class="form-section">
<h2>Booking Details</h2>

<div class="row">
<div>
<label>Check-in Date</label>
<input type="date" required>
</div>

<div>
<label>Check-out Date</label>
<input type="date" required>
</div>
</div>

<label>Room Type</label>
<select required>
<option value="">Select Room</option>
<option>Standard Room</option>
<option>Deluxe Room</option>
<option>Ocean View Suite</option>
<option>Family Villa</option>
</select>

<label>Number of Guests</label>
<select>
<option>1 Guest</option>
<option>2 Guests</option>
<option>3 Guests</option>
<option>4 Guests</option>
</select>

</div>

<div class="form-section payment-box">
<h2>Payment Information</h2>

<label>Name on Card</label>
<input type="text" placeholder="Cardholder name" required>

<label>Card Number</label>
<input type="text" placeholder="1234 5678 9012 3456" required>

<div class="row">
<div>
<label>Expiry Date</label>
<input type="month" required>
</div>

<div>
<label>CVV</label>
<input type="password" placeholder="123" required>
</div>
</div>

</div>

<button type="submit">Confirm Booking</button>

</form>

</div>

</body>
</html>
