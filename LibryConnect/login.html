<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - LibryConnect</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="navbar-placeholder"></div>
    
    <div class="lib-card">
        <h2 style="font-family: var(--vintage-serif); font-size: 2.2rem; margin-bottom: 2.5rem; text-transform: uppercase;">Patron Access</h2>
        <form onsubmit="handleLogin(event)">
            <label class="lib-label">Patron ID / Username</label>
            <input type="text" id="username" class="input-line" required placeholder="admin / staff / user">
            
            <label class="lib-label" style="margin-top: 1rem;">PIN / Password</label>
            <input type="password" id="password" class="input-line" required placeholder="••••••••">
            
            <button type="submit" class="btn-vintage" style="width: 100%; margin-top: 1.5rem; padding: 1.2rem;">Authenticate</button>
        </form>
    </div>

    <script src="script.js"></script>
</body>
</html>
