<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Search - LibryConnect</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="navbar-placeholder"></div>

    <main class="search-centric">
        <h1 style="font-size: 3.5rem; margin-bottom: 2rem; font-family: var(--vintage-serif);">Discover Knowledge</h1>
        
        <form onsubmit="performSearch(event)" style="width: 100%; text-align: center; display: flex; justify-content: center; gap: 1rem; align-items: center;">
            <input type="text" id="search-query" class="massive-search" placeholder="Search by title, author, or ISBN...">
            <button type="submit" class="btn-vintage" style="padding: 1.35rem 3rem; font-size: 1.4rem;">Search</button>
        </form>

        <div id="search-results">
            <h3 id="search-term-display" style="border-bottom: 3px solid var(--ink); padding-bottom: 0.5rem; font-family: var(--modern-font);"></h3>
            <div id="catalog-container"></div>
        </div>
    </main>

    <!-- Modal for Processing Loans -->
    <div id="loan-modal" class="libry-modal-overlay">
        <div class="libry-modal-content">
            <h2 style="font-family: var(--vintage-serif); margin-bottom: 1rem; text-transform: uppercase;">Loan Processing</h2>
            <p style="margin-bottom: 1.5rem; font-family: var(--vintage-mono);">ITEM: <strong id="loan-book-title"></strong></p>
            <form onsubmit="submitLoan(event)">
                <label class="lib-label">Enter Patron ID</label>
                <input type="text" id="loan-patron-id" class="input-line" required placeholder="user">
                <div style="display: flex; gap: 10px; margin-top: 1rem;">
                    <button type="submit" class="btn-vintage" style="flex: 1;">Finalize Loan</button>
                    <button type="button" class="btn-vintage btn-outline" style="flex: 1;" onclick="closeLoanModal()">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
