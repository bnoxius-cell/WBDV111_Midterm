<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Active Loans - LibryConnect</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="navbar-placeholder"></div>

    <div class="page-container">
        <h2>Active Loans & Holds</h2>
        
        <div class="lib-card ruled-lines" style="margin-top: 2rem;">
            <div style="display: flex; justify-content: space-between; border-bottom: 2px solid var(--ink); margin-bottom: 10px; padding-bottom: 5px; line-height: normal;">
                <h3 style="font-size: 1.1rem;">TITLE / AUTHOR</h3>
                <h3 style="font-size: 1.1rem;">DUE DATE</h3>
            </div>
            
            <div style="display: flex; justify-content: space-between; padding-right: 10px;">
                <span style="font-weight: 600;">El Filibusterismo - Jose Rizal</span>
                <span style="font-family: 'Courier New', monospace; font-weight: bold; color: var(--faded-blue);">NOV 02, 2024</span>
            </div>
            <div style="display: flex; justify-content: space-between; padding-right: 10px;">
                <span style="font-weight: 600;">Trese: Murder on Balete Drive - Budjette Tan</span>
                <span style="font-family: 'Courier New', monospace; font-weight: bold; color: var(--faded-blue);">NOV 15, 2024</span>
            </div>
        </div>
        
        <button class="lib-btn" style="margin-top: 1.5rem;">Renew All Eligible</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
