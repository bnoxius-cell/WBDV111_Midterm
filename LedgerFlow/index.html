<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LedgerFlow</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="navbar-placeholder"></div>

<div class="login-container">

<h2 style="text-align: center; margin-bottom: 30px;">Secure Access</h2>

<form onsubmit="handleLogin(event)">
<label>Username</label>
<input type="text" id="username" placeholder="admin / staff / user" required>

<label>Password</label>
<input type="password" id="password" placeholder="••••••••" required>

<button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px;">Authenticate</button>
</form>

<div class="secure">
🛡️ 256-bit Encryption • 2FA Required
</div>

</div>

<script src="script.js"></script>
</body>
</html>
