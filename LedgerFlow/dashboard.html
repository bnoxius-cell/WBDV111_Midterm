<!DOCTYPE html>
<html>
<head>
<title>LedgerFlow Dashboard</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="navbar-placeholder"></div>

<div class="container">

<h2 style="margin-bottom: 30px;">Overview</h2>

<div class="cards">

<div class="card">
<b>Total Invoices</b>
<h2 id="dash-invoices">0</h2>
</div>

<div class="card">
<b>Pending Payments</b>
<h2 id="dash-pending">$0</h2>
</div>

<div class="card">
<b>Clients</b>
<h2 id="dash-clients">0</h2>
</div>

</div>

<div class="table-wrapper">
<table class="data-table">
<thead>
<tr>
<th>Invoice</th>
<th>Client</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>
<tbody id="dash-recent-tbody">
    <!-- Populated by JS -->
</tbody>
</table>
</div>

</div>

<script src="script.js"></script>
</body>
</html>
