<!DOCTYPE html>
<html>
<head>
<title>Payments - LedgerFlow</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="navbar-placeholder"></div>

<div class="login-container" style="max-width: 600px; margin-top: 60px;">

<h2 style="margin-bottom: 30px;">Create & Issue Invoice</h2>

<form onsubmit="handleCreateInvoice(event)">
    <label>1. Create Invoice</label>
    <input type="text" id="inv-id" placeholder="Invoice Title or ID (e.g., INV-103)" required>
    
    <label>2. Add Client</label>
    <select id="inv-client" style="width: 100%; padding: 14px 16px; margin-bottom: 20px; border: 1px solid var(--border); border-radius: 6px; font-size: 0.95rem; background: var(--bg);" required>
        <option value="">Select Client</option>
    </select>
    
    <label>3. Set Due Date</label>
    <input type="date" id="inv-date" required>
    
    <label>4. Amount</label>
    <input type="number" id="inv-amount" placeholder="$0.00" min="0.01" step="0.01" required>

    <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 20px;">Generate Payment Link / PDF</button>
</form>
</div>

<script src="script.js"></script>
</body>
</html>
