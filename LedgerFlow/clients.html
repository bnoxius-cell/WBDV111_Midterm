<!DOCTYPE html>
<html>
<head>
<title>Clients - LedgerFlow</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="navbar-placeholder"></div>

<div class="container">

<div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
    <h2 style="margin: 0;">Client Directory</h2>
    <button class="btn btn-primary" onclick="openAddClientModal()">Add Client</button>
</div>

<div class="table-wrapper">
<table>
<thead>
<tr>
<th>Name</th>
<th>Email</th>
<th>Company</th>
<th>Action</th>
</tr>
</thead>
<tbody id="clients-tbody">
    <!-- Populated by JS -->
</tbody>
</table>
</div>

</div>

<div id="add-client-modal" class="modal-overlay">
    <div class="modal-content">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
            <h2 style="margin: 0; font-size: 1.5rem;">New Client</h2>
            <button class="btn btn-outline btn-sm" style="padding: 4px 8px; border: none;" onclick="closeAddClientModal()">✕</button>
        </div>
        <form onsubmit="submitAddClient(event)">
            <label>Full Name</label>
            <input type="text" id="new-client-name" placeholder="e.g., John Doe" required>
            
            <label>Email Address</label>
            <input type="email" id="new-client-email" placeholder="john@example.com" required>
            
            <label>Company Name</label>
            <input type="text" id="new-client-company" placeholder="Acme Corp" required>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px;">Save Client</button>
        </form>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
