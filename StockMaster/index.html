<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Stock - StockMaster</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="navbar-placeholder"></div>

    <main class="main-content">
        <h1>Master Inventory</h1>

        <div class="action-bar">
            <div>
                <input type="text" id="scan-input" class="input-flat" placeholder="Awaiting Scanner Input...">
                <button class="btn btn-secondary auth-restricted" onclick="openManualEntryModal()">Manual Entry</button>
            </div>
            <button class="btn btn-action" onclick="scanItem()">ACTIVATE SCANNER</button>
        </div>

        <table class="data-table">
            <thead>
                <tr>
                    <th>SKU / Barcode</th>
                    <th>Item Description</th>
                    <th>Quantity</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="inventory-tbody">
                <!-- Populated by JS -->
            </tbody>
        </table>
    </main>

    <div id="limit-modal" class="modal-overlay">
        <div class="modal-content">
            <h2 style="margin-top: 0; font-size: 1.5rem;">SET STOCK LIMIT</h2>
            <p style="margin-bottom: 1.5rem; color: var(--text-light);">Item: <strong id="limit-item-name" style="color: var(--text-main);"></strong></p>
            
            <form onsubmit="submitLimit(event)">
                <label style="display: block; font-weight: 800; margin-bottom: 0.5rem; text-transform: uppercase;">Minimum Warning Limit</label>
                <input type="number" id="limit-input" class="input-flat" style="width: 100%; max-width: 100%; margin-bottom: 2rem;" required min="0">
                
                <div style="display: flex; gap: 10px;">
                    <button type="submit" class="btn btn-action" style="flex: 1;">SAVE LIMIT</button>
                    <button type="button" class="btn btn-secondary" style="flex: 1;" onclick="closeLimitModal()">CANCEL</button>
                </div>
            </form>
        </div>
    </div>

    <div id="manual-entry-modal" class="modal-overlay">
        <div class="modal-content">
            <h2 style="margin-top: 0; font-size: 1.5rem;">MANUAL ENTRY</h2>
            
            <form onsubmit="submitManualEntry(event)">
                <label style="display: block; font-weight: 800; margin-bottom: 0.5rem; text-transform: uppercase;">SKU / Barcode</label>
                <input type="text" id="me-sku" class="input-flat" style="width: 100%; max-width: 100%; margin-bottom: 1rem;" required>
                
                <label style="display: block; font-weight: 800; margin-bottom: 0.5rem; text-transform: uppercase;">Item Description</label>
                <input type="text" id="me-desc" class="input-flat" style="width: 100%; max-width: 100%; margin-bottom: 1rem;" required>
                
                <label style="display: block; font-weight: 800; margin-bottom: 0.5rem; text-transform: uppercase;">Quantity</label>
                <input type="number" id="me-qty" class="input-flat" style="width: 100%; max-width: 100%; margin-bottom: 2rem;" required min="1">
                
                <div style="display: flex; gap: 10px;">
                    <button type="submit" class="btn btn-action" style="flex: 1;">LOG ENTRY</button>
                    <button type="button" class="btn btn-secondary" style="flex: 1;" onclick="closeManualEntryModal()">CANCEL</button>
                </div>
            </form>
        </div>
    </div>
    
    <div id="edit-modal" class="modal-overlay">
        <div class="modal-content">
            <h2 style="margin-top: 0; font-size: 1.5rem;">EDIT ITEM</h2>
            
            <form onsubmit="submitEdit(event)">
                <label style="display: block; font-weight: 800; margin-bottom: 0.5rem; text-transform: uppercase;">Item Description</label>
                <input type="text" id="edit-desc" class="input-flat" style="width: 100%; max-width: 100%; margin-bottom: 1rem;" required>
                
                <label style="display: block; font-weight: 800; margin-bottom: 0.5rem; text-transform: uppercase;">Quantity</label>
                <input type="number" id="edit-qty" class="input-flat" style="width: 100%; max-width: 100%; margin-bottom: 1rem;" required min="0">

                <label style="display: block; font-weight: 800; margin-bottom: 0.5rem; text-transform: uppercase;">Price</label>
                <input type="number" id="edit-price" class="input-flat" style="width: 100%; max-width: 100%; margin-bottom: 2rem;" required min="0" step="0.01">
                
                <div style="display: flex; gap: 10px;">
                    <button type="submit" class="btn btn-action" style="flex: 1;">SAVE CHANGES</button>
                    <button type="button" class="btn btn-secondary" style="flex: 1;" onclick="closeEditModal()">CANCEL</button>
                </div>
            </form>
        </div>
    </div>

    <div id="dispatch-modal" class="modal-overlay">
        <div class="modal-content">
            <h2 style="margin-top: 0; font-size: 1.5rem;">DISPATCH ITEM</h2>
            <p style="margin-bottom: 1.5rem; color: var(--text-light);">Item: <strong id="dispatch-item-name" style="color: var(--text-main);"></strong> <br>Current Stock: <span id="dispatch-current-qty"></span></p>
            
            <form onsubmit="submitDispatch(event)">
                <label style="display: block; font-weight: 800; margin-bottom: 0.5rem; text-transform: uppercase;">Quantity to Dispatch</label>
                <input type="number" id="dispatch-qty" class="input-flat" style="width: 100%; max-width: 100%; margin-bottom: 2rem;" required min="1">
                
                <div style="display: flex; gap: 10px;">
                    <button type="submit" class="btn btn-action" style="flex: 1;">DISPATCH</button>
                    <button type="button" class="btn btn-secondary" style="flex: 1;" onclick="closeDispatchModal()">CANCEL</button>
                </div>
            </form>
        </div>
    </div>

    <div id="delete-modal" class="modal-overlay">
        <div class="modal-content">
            <h2 style="margin-top: 0; font-size: 1.5rem; color: #ef4444;">CONFIRM DELETION</h2>
            <p style="margin-bottom: 2rem; color: var(--text-main);">Are you sure you want to completely remove <strong id="delete-item-sku"></strong> from the master inventory? This action cannot be undone.</p>
            
            <div style="display: flex; gap: 10px;">
                <button type="button" class="btn btn-alert" style="flex: 1; font-size: 1rem; padding: 12px;" onclick="confirmDelete()">DELETE ITEM</button>
                <button type="button" class="btn btn-secondary" style="flex: 1;" onclick="closeDeleteModal()">CANCEL</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
