<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reports - StockMaster</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="navbar-placeholder"></div>

    <main class="main-content">
        <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 2rem;">
            <h1 style="margin: 0;">System Reports</h1>
            <button class="btn btn-action" onclick="generateReport()">GENERATE MASTER REPORT</button>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 2rem; margin-bottom: 2rem;">
            <div style="background: var(--white); border: var(--border-thick); padding: 2rem;">
                <h3 style="color: var(--text-light); margin-bottom: 0.5rem;">TOTAL INVENTORY VALUE</h3>
                <h2 style="font-size: 2.5rem; margin: 0;">PHP 2.4M</h2>
            </div>
            <div style="background: var(--white); border: var(--border-thick); padding: 2rem;">
                <h3 style="color: var(--text-light); margin-bottom: 0.5rem;">CRITICAL STOCK ITEMS</h3>
                <h2 style="font-size: 2.5rem; color: #ef4444; margin: 0;">14</h2>
            </div>
            <div style="background: var(--white); border: var(--border-thick); padding: 2rem;">
                <h3 style="color: var(--text-light); margin-bottom: 0.5rem;">PENDING DELIVERIES</h3>
                <h2 style="font-size: 2.5rem; margin: 0;">6</h2>
            </div>
        </div>

        <div style="background: var(--white); border: 1px solid var(--border-color); padding: 2rem; height: 300px; display: flex; align-items: center; justify-content: center; color: var(--text-light); font-weight: bold;">
            [ DATA VISUALIZATION MODULE RENDERED HERE ]
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
