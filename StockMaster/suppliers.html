<!DOCTYPE html>
<html lang="en">
<head>

    <title>Suppliers - StockMaster</title>

</head>
<body>
    <div id="navbar-placeholder"></div>

    <main class="main-content">
        <h1>Supplier Directory</h1>

        <table class="data-table">
            <thead>
                <tr>
                    <th>Supplier Code</th>

                    <th>Region</th>
                    <th>Contact Person</th>
                    <th>Command</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td style="font-family: monospace;">SUP-001</td>
                    <td><strong>Manila Logistics Corp.</strong></td>
                    <td>Metro Manila</td>
                    <td>Juan Dela Cruz</td>
                    <td><button class="btn btn-alert" onclick="alertSupplier('Manila Logistics Corp.')">ALERT RESTOCK</button></td>
                </tr>
                <tr>
                    <td style="font-family: monospace;">SUP-045</td>
                    <td><strong>Cebu Hardware Suppliers Inc.</strong></td>
                    <td>Visayas</td>
                    <td>Maria Santos</td>
                    <td><button class="btn btn-alert" onclick="alertSupplier('Cebu Hardware Suppliers Inc.')">ALERT RESTOCK</button></td>
                </tr>
                <tr>
                    <td style="font-family: monospace;">SUP-088</td>
                    <td><strong>Global Packaging PH</strong></td>
                    <td>Laguna</td>
                    <td>Carlos Reyes</td>
                    <td><button class="btn btn-alert" onclick="alertSupplier('Global Packaging PH')">ALERT RESTOCK</button></td>
                </tr>
            </tbody>
        </table>
    </main>

    <script src="script.js"></script>
</body>
</html>
