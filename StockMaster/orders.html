<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Orders - StockMaster</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="navbar-placeholder"></div>

    <main class="main-content">
        <h1>Active Orders</h1>

        <div class="action-bar" style="border-left-color: var(--text-main);">
            <h2 style="margin: 0; color: var(--text-main);">INBOUND FREIGHT</h2>
            <p style="margin: 0; font-weight: bold;">Warehouse Dock: Valenzuela City, Gate 4</p>
        </div>

        <table class="data-table">
            <thead>
                <tr>
                    <th>Manifest ID</th>
                    <th>Supplier</th>
                    <th>Expected Date</th>
                    <th>Total Value</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="orders-tbody">
                <!-- Populated by JS -->
            </tbody>
        </table>
    </main>

    <script src="script.js"></script>
</body>
</html>
