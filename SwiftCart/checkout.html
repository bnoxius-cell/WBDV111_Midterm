<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Checkout - SwiftCart</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="navbar-placeholder"></div>

    <main class="page-container">
        <h2>Shipping Details</h2>
        <p>Where should we send your order?</p>

        <form onsubmit="processCheckout(event)" style="margin-top: 2rem;">
            <div class="input-group">
                <label>Full Name</label>
                <input type="text" class="form-control" required placeholder="Jane Doe">
            </div>
            <div class="input-group">
                <label>Street Address</label>
                <input type="text" class="form-control" required placeholder="123 Innovation Drive">
            </div>
            <div style="display: flex; gap: 1rem;">
                <div class="input-group" style="flex: 2;">
                    <label>City</label>
                    <input type="text" class="form-control" required placeholder="Techville">
                </div>
                <div class="input-group" style="flex: 1;">
                    <label>Zip Code</label>
                    <input type="text" class="form-control" required placeholder="10101">
                </div>
            </div>
            
            <hr style="border: 0; border-top: 1px solid var(--border); margin: 2rem 0;">
            <button type="submit" class="btn-primary" style="width: 100%; font-size: 1.1rem; padding: 15px;">Place Secure Order</button>
        </form>
    </main>

    <div id="checkout-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="success-icon">✓</div>
            <h2>Order Successful!</h2>
            <p>Your order #SW-899120 has been placed. We'll email you a receipt and shipping confirmation shortly.</p>
            <button class="btn-primary" style="width: 100%; margin-top: 1rem;" onclick="window.location.href='status.html'">Track Order</button>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
