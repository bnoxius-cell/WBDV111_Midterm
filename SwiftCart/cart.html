<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Your Cart - SwiftCart</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="navbar-placeholder"></div>

    <div class="page-container">
        <h2>Shopping Cart</h2>
        
        <div style="border-bottom: 1px solid var(--border); padding-bottom: 1rem; margin-bottom: 1rem; display: flex; justify-content: space-between; align-items: center;">
            <div style="display: flex; align-items: center; gap: 15px;">
                <div style="width: 60px; height: 60px; background: #eee; border-radius: 6px; overflow: hidden;">
                    <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=100&q=80" style="width:100%; height:100%; object-fit:cover;">
                </div>
                <div>
                    <h4 style="margin-bottom: 0.2rem;">Swift Watch Gen 4</h4>
                    <span style="color: var(--text-muted); font-size: 0.85rem;">Qty: 1</span>
                </div>
            </div>
            <div style="font-weight: bold;">$199.50</div>
        </div>

        <div style="border-bottom: 1px solid var(--border); padding-bottom: 1rem; margin-bottom: 1.5rem; display: flex; justify-content: space-between; align-items: center;">
            <div style="display: flex; align-items: center; gap: 15px;">
                <div style="width: 60px; height: 60px; background: #eee; border-radius: 6px; overflow: hidden;">
                    <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=100&q=80" style="width:100%; height:100%; object-fit:cover;">
                </div>
                <div>
                    <h4 style="margin-bottom: 0.2rem;">Urban Runners</h4>
                    <span style="color: var(--text-muted); font-size: 0.85rem;">Qty: 1</span>
                </div>
            </div>
            <div style="font-weight: bold;">$120.00</div>
        </div>

        <div style="text-align: right; margin-bottom: 2rem;">
            <h3 style="margin-bottom: 0.5rem;">Total: $319.50</h3>
            <p style="font-size: 0.85rem;">Taxes and shipping calculated at checkout</p>
        </div>

        <div style="display: flex; justify-content: flex-end; gap: 10px;">
            <a href="index.html" class="btn-primary btn-outline">Continue Shopping</a>
            <a href="checkout.html" class="btn-primary">Proceed to Shipping</a>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
