<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Order Status - SwiftCart</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="navbar-placeholder"></div>

    <div class="page-container">
        <h2>Track Live Package</h2>
        <p>Order #SC-900281 • <span style="color: var(--primary); font-weight: bold;">In Transit</span></p>

        <div class="progress-container">
            <div class="progress-step active">
                <div class="step-label">Ordered</div>
            </div>
            <div class="progress-step active">
                <div class="step-label">Packed</div>
            </div>
            <div class="progress-step active">
                <div class="step-label" style="font-weight: 800; color: var(--primary);">Shipped</div>
            </div>
            <div class="progress-step">
                <div class="step-label">Out for Delivery</div>
            </div>
            <div class="progress-step">
                <div class="step-label">Delivered</div>
            </div>
        </div>

        <div style="background: var(--bg-light); padding: 1.5rem; border-radius: 8px; border: 1px solid var(--border); margin-top: 4rem;">
            <h3 style="font-size: 1.1rem; margin-bottom: 0.5rem;">Latest Update</h3>
            <p style="margin: 0; color: var(--text-dark);"><strong>Today, 8:45 AM:</strong> Package has left the regional sorting facility and is on its way to your local hub.</p>
        </div>
        
        <button class="btn-primary btn-outline" style="width: 100%; margin-top: 1rem;">View Order Receipt</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
