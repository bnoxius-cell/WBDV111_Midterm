<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Order Status - SwiftCart</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="navbar-placeholder"></div>

    <main class="page-container">
        <h2>Track Live Package</h2>
        <p>Order #SW-899120</p>
        
        <div class="progress-container">
            <div class="progress-step active">
                <span class="step-label">Ordered</span>
            </div>
            <div class="progress-step active">
                <span class="step-label">Shipped</span>
            </div>
            <div class="progress-step">
                <span class="step-label">In Transit</span>
            </div>
            <div class="progress-step">
                <span class="step-label">Delivered</span>
            </div>
        </div>

        <div style="background: #eff6ff; padding: 1.5rem; border-radius: 8px; border: 1px solid #bfdbfe; margin-top: 4rem;">
            <h3 style="margin-bottom: 0.5rem; color: var(--primary);">Update: Package Shipped</h3>
            <p style="margin: 0; color: #1e3a8a;">Your package has left our fulfillment center and is currently on its way to the carrier facility.</p>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
