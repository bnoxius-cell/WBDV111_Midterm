<!DOCTYPE html>
<html>
<head>
    <title>Nutrition Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- Hidden Toggle -->
<input type="checkbox" id="loginToggle" class="drawer-toggle">

<aside class="sidebar">
    <div class="logo"><a href="index.html">FreshBite Prep</a></div>
    <div class="nav-btns">
        <a href="index.html">Plans</a>
        <a href="meals.html">Meals</a>
        <a href="macros.html">Nutrients</a>
        <a href="#" onclick="checkDeliveryAccess(event)">Billing</a>
    </div>
    <div style="margin-top: auto;">
        <label for="loginToggle" id="auth-btn-label" class="login-open-btn">Login</label>
        <button id="logout-btn" class="primary-btn" style="display:none; width: 100%;" onclick="handleLogout()">Logout</button>
    </div>
</aside>

<div class="login-drawer">

    <div class="drawer-header">
        <h2>Login</h2>
        <label for="loginToggle" class="close-btn">✕</label>
    </div>

    <form class="drawer-form" onsubmit="handleLogin(event)">
        <label>Username</label>
        <input type="text" id="username" placeholder="admin / staff / user" required>

        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••" required>

        <a href="#" class="forgot">Forgot password?</a>

        <button type="submit">Login</button>

        <p class="register-text">
            Don't have an account?
            <a href="#">Register</a>
        </p>
    </form>
</div>

<main class="main-content">
<h1>Your Weekly Macros</h1>

<div class="dashboard">

  <div class="macro-box">
    <h2>Calories</h2>
    <p id="total-cals">0 kcal</p>
  </div>

  <div class="macro-box">
    <h2>Protein</h2>
    <p id="total-pro">0 g</p>
  </div>

  <div class="macro-box">
    <h2>Carbs</h2>
    <p id="total-carbs">0 g</p>
  </div>

  <div class="macro-box">
    <h2>Fats</h2>
    <p id="total-fats">0 g</p>
  </div>
  <p style="text-align:center; color:#64748b;">
  Estimated weekly nutrition based on your selected meals
</p>
</div>
</main>

<script src="script.js"></script>
</body>
</html>
