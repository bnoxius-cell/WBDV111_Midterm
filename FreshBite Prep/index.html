<!DOCTYPE html>
<html>
<head>
    <title>FreshBite Prep - Select Diet</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>


<!-- Hidden Toggle -->
<input type="checkbox" id="loginToggle" class="drawer-toggle">

<aside class="sidebar">
    <div class="logo"><a href="index.html">FreshBite Prep</a></div>
    <div class="nav-btns">
        <a href="index.html">Plans</a>
        <a href="meals.html">Meals</a>
        <a href="macros.html">Nutrients</a>
        <a href="#" onclick="checkDeliveryAccess(event)">Billing</a>
    </div>
    <div style="margin-top: auto;">
        <label for="loginToggle" id="auth-btn-label" class="login-open-btn">Login</label>
        <button id="logout-btn" class="primary-btn" style="display:none; width: 100%;" onclick="handleLogout()">Logout</button>
    </div>
</aside>

<div class="login-drawer">

    <div class="drawer-header">
        <h2>Login</h2>
        <label for="loginToggle" class="close-btn">✕</label>
    </div>

    <form class="drawer-form" onsubmit="handleLogin(event)">
        <label>Username</label>
        <input type="text" id="username" placeholder="admin / staff / user" required>

        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••" required>

        <a href="#" class="forgot">Forgot password?</a>

        <button type="submit">Login</button>

        <p class="register-text">
            Don't have an account?
            <a href="#">Register</a>
        </p>
    </form>
</div>

<main class="main-content">
<section class="hero">
    <h2>Select Your Diet Plan</h2>

    <div class="card-container">
        <a href="meals.html" class="card" onclick="selectDiet(event, 'keto')">
        <h3>Keto</h3>
        <p>Low carb, high fat meals.</p>
        </a>

        <a href="meals.html" class="card" onclick="selectDiet(event, 'high-protein')">
        <h3>High Protein</h3>
        <p>Muscle-building meals.</p>
        </a>

        <a href="meals.html" class="card" onclick="selectDiet(event, 'vegetarian')">
        <h3>Vegetarian</h3>
        <p>Plant-based nutrition.</p>
        </a>
    </div>
</section>
</main>

<script src="script.js"></script>
</body>
</html>
