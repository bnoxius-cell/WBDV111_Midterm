<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Schedule - Velvet Crust</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="navbar-placeholder"></div>

    <div class="content-wrapper">
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 2rem;">
            
            <div class="glass-panel">
                <h3>Pickup Location</h3>
                <p>123 Velvet Lane, Pastry District<br>Metro City, 10012</p>
                <p style="margin-top: 1rem;">Present your order confirmation number at the front desk upon arrival.</p>
            </div>

            <div class="glass-panel">
                <h2>Your Order Status</h2>
                <div style="background: rgba(255,255,255,0.5); padding: 1rem; border-radius: 8px; margin-bottom: 1rem; border-left: 4px solid var(--dark-text);">
                    <h3 style="font-size: 1.1rem; margin-bottom: 5px;">Order #VC-8892</h3>
                    <p style="margin: 0; font-size: 0.9rem; color: var(--dark-text);">Custom Mix & Match - <strong style="color: #2e7d32;">Ready for Pickup</strong></p>
                </div>
                <div style="background: rgba(255,255,255,0.5); padding: 1rem; border-radius: 8px; border-left: 4px solid #aaa;">
                    <h3 style="font-size: 1.1rem; margin-bottom: 5px;">Order #VC-8901</h3>
                    <p style="margin: 0; font-size: 0.9rem; color: var(--dark-text);">Signature Floral - <strong>Baking in Progress</strong></p>
                </div>
            </div>

        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
