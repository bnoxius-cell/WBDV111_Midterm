<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - Velvet Crust</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="justify-content: center; align-items: center; min-height: 100vh;">
    
    <div id="navbar-placeholder" style="position: fixed; top: 0; width: 100%;"></div>

    <div class="glass-panel" style="width: 100%; max-width: 450px; text-align: center; margin-top: 80px;">
        <h2 style="border: none; margin-bottom: 0.5rem; font-size: 2.5rem; color: var(--cream);">Sign In</h2>
        <p style="margin-bottom: 2rem;">Welcome back to Velvet Crust.</p>
        
        <form onsubmit="handleLogin(event)" style="text-align: left;">
            <div class="form-group">
                <label>Email or Username</label>
                <input type="text" id="username" class="glass-input" required>
            </div>
            
            <div class="form-group">
                <label>Password</label>
                <input type="password" class="glass-input" required>
            </div>
            
            <div style="display: flex; justify-content: space-between; font-size: 0.85rem; margin-bottom: 2rem;">
                <label style="color: #ccc;"><input type="checkbox"> Remember me</label>
                <a href="#" style="color: var(--cream); text-decoration: none;">Forgot password?</a>
            </div>

            <button type="submit" class="cream-btn" style="width: 100%;">Sign In</button>
            
            <p style="text-align: center; margin-top: 1.5rem; font-size: 0.9rem;">
                Don't have an account? <a href="#" style="color: var(--cream); text-decoration: none; font-weight: bold;">Sign up</a>
            </p>
        </form>
    </div>

    <script src="script.js"></script>
</body>
</html>
