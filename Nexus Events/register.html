<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register - Nexus Events</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="background: var(--pop-cyan); justify-content: center;">
    <div id="navbar-placeholder" style="position: absolute; top: 0; width: 100%;"></div>

    <div class="page-container" style="display: flex; justify-content: center; align-items: center;">
        <div class="neo-card" style="width: 100%; max-width: 500px; padding: 3rem; background: var(--pop-pink);">
            <h1 style="font-size: 4rem; text-align: center; margin-bottom: 2rem; color: var(--pop-yellow);">JOIN<br>NEXUS</h1>
            
            <form action="login.html">
                <label style="font-family: 'Archivo Black', sans-serif; font-size: 1.2rem; color: var(--black);">EMAIL</label>
                <input type="email" class="neo-input" placeholder="YOU@RAVE.COM" required>
                
                <label style="font-family: 'Archivo Black', sans-serif; font-size: 1.2rem; color: var(--black);">USERNAME</label>
                <input type="text" class="neo-input" placeholder="RAVER_99" required>
                
                <label style="font-family: 'Archivo Black', sans-serif; font-size: 1.2rem; color: var(--black);">PASSWORD</label>
                <input type="password" class="neo-input" placeholder="••••••••" required>
                
                <button type="submit" class="neo-btn" style="background: var(--pop-yellow); width: 100%; font-size: 2rem; margin-top: 1rem;">REGISTER</button>
            </form>
            
            <p style="text-align: center; margin-top: 1.5rem; font-family: 'Courier New', monospace; font-weight: bold; color: var(--black);">ALREADY HAVE AN ACCOUNT? <a href="login.html" style="color: var(--white);">LOG IN</a></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
