<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Your Pass - Nexus Events</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="navbar-placeholder"></div>

    <div class="page-container">
        <h1 style="text-align: center; margin-bottom: 3rem; color: var(--pop-pink);">YOUR PASS</h1>

        <div class="ticket-pass">
            <div class="ticket-stub">
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=NexusVIPPass12345" alt="QR Code" style="width: 100%; max-width: 200px; border: var(--border-thick); box-shadow: 4px 4px 0px var(--black);">
            </div>
            
            <div class="ticket-details">
                <h3 style="color: var(--pop-purple); margin-bottom: 0.5rem;">TICKET #NX-88201</h3>
                <h1 style="font-size: 3rem; margin-bottom: 1rem;">Midnight Cyber-Goth</h1>
                
                <div style="display: flex; gap: 2rem; margin-bottom: 2rem; border-top: var(--border-thick); border-bottom: var(--border-thick); padding: 1rem 0;">
                    <div>
                        <p style="margin: 0; color: #666;">DATE</p>
                        <h3>OCT 13</h3>
                    </div>
                    <div>
                        <p style="margin: 0; color: #666;">DOORS</p>
                        <h3>10:00 PM</h3>
                    </div>
                    <div>
                        <p style="margin: 0; color: #666;">TIER</p>
                        <h3 style="color: var(--pop-pink);">V.I.P</h3>
                    </div>
                </div>

                <p>VENUE: <strong>The Boiler Room, 404 Synth Ave.</strong></p>
                <p style="font-size: 0.9rem; color: #666;">Present this QR code at the door. 21+ strictly enforced. No refunds.</p>
                
                <button onclick="window.print()" class="neo-btn btn-cyan" style="margin-top: 1rem;">SAVE TICKET</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
