<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Your Pass - Nexus Events</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="navbar-placeholder"></div>

    <div class="page-container">
        <h1 style="text-align: center; margin-bottom: 3rem;">YOUR DIGITAL PASS</h1>

        <div class="ticket-pass">
            <div class="ticket-stub">
                <!-- Pseudo QR Code Style -->
                <div style="width: 150px; height: 150px; background: repeating-linear-gradient(45deg, var(--black), var(--black) 10px, var(--white) 10px, var(--white) 20px); border: var(--border-thick); display: flex; align-items: center; justify-content: center; background-color: var(--white);">
                    <div style="background: var(--white); padding: 10px; font-family: 'Archivo Black', sans-serif; border: var(--border-thick);">SCAN ME</div>
                </div>
            </div>
            <div class="ticket-details" style="background: var(--pop-yellow);">
                <h2 style="font-size: clamp(1.8rem, 5vw, 3rem); color: var(--pop-purple); margin-bottom: 0;">MIDNIGHT CYBER-GOTH</h2>
                <p style="font-size: 1.5rem; border-bottom: var(--border-thick); padding-bottom: 1rem;">FRI OCT 13 // THE BOILER ROOM</p>
                
                <div style="display: flex; justify-content: space-between; margin-top: 2rem; flex-wrap: wrap; gap: 1rem;">
                    <div>
                        <h3 style="font-size: 1.2rem; color: var(--black);">ATTENDEE</h3>
                        <p style="font-size: 1.5rem; margin-bottom: 0;">JOHN DOE</p>
                    </div>
                    <div>
                        <h3 style="font-size: 1.2rem; color: var(--black);">TIER</h3>
                        <p style="font-size: 1.5rem; margin-bottom: 0;">VIP ALL-ACCESS</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
