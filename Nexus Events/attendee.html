<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Guestlist - Nexus Events</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="navbar-placeholder"></div>

    <div class="page-container" style="max-width: 800px;">
        <h1 style="text-align: center;">GUEST DETAILS</h1>
        <p style="text-align: center;">SECURE YOUR SPOT ON THE GUESTLIST</p>

        <div class="neo-form" style="background: var(--white); color: var(--black);">
            <form action="ticket-pass.html">
                <label>FULL NAME</label>
                <input type="text" class="neo-input" placeholder="JOHN DOE" required>

                <label>EMAIL</label>
                <input type="email" class="neo-input" placeholder="JD@EXAMPLE.COM" required>

                <label>PHONE (OPTIONAL)</label>
                <input type="tel" class="neo-input" placeholder="555-0199">

                <button type="submit" class="neo-btn btn-cyan" style="width: 100%; font-size: 2rem; margin-top: 2rem;">GENERATE QR CODE</button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
