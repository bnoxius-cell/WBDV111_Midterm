<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Venue - Nexus Events</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="background: var(--pop-purple);">
    <div id="navbar-placeholder"></div>

    <div class="page-container">
        <h1 style="text-align: center; color: var(--pop-yellow);">THE WAREHOUSE</h1>
        
        <div class="neo-card" style="background: var(--white); text-align: center; max-width: 800px; margin: 0 auto;">
            <div style="background: var(--pop-cyan); height: 300px; border: var(--border-thick); margin-bottom: 2rem; display: flex; align-items: center; justify-content: center;">
                <h2 style="color: var(--black); margin: 0;">[ MAP PLACEHOLDER ]</h2>
            </div>
            
            <h2 style="color: var(--pop-pink);">999 INDUSTRIAL BLVD.</h2>
            <p style="font-size: 1.5rem;">METRO CITY, MC 10101</p>
            
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 2rem; margin-top: 2rem; text-align: left;">
                <div style="background: var(--bg-light); padding: 1.5rem; border: var(--border-thick);">
                    <h3>PARKING</h3>
                    <p>Free street parking after 8PM. VIP lot available at the rear entrance.</p>
                </div>
                <div style="background: var(--bg-light); padding: 1.5rem; border: var(--border-thick);">
                    <h3>RULES</h3>
                    <p>No outside drinks. 21+ only. Clear bags strictly enforced.</p>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
