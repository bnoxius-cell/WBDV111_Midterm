<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tickets - Nexus Events</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="navbar-placeholder"></div>

    <div class="page-container">
        <h1 style="text-align: center; margin-bottom: 3rem;">SELECT TIER</h1>
        
        <div class="card-grid">
            <div class="neo-card" style="background: var(--white); text-align: center;">
                <h2 style="color: var(--black);">GENERAL</h2>
                <p style="font-size: 3rem; margin: 1rem 0;">$45</p>
                <p>FLOOR ACCESS<br>CASH BAR<br>STANDARD ENTRY</p>
                <a href="attendee.html" class="neo-btn btn-pink" style="width: 100%; margin-top: 1rem;">BUY NOW</a>
            </div>

            <div class="neo-card" style="background: var(--pop-yellow); text-align: center; transform: scale(1.05); border-color: var(--pop-purple);">
                <h2 style="color: var(--pop-purple);">VIP ALL-ACCESS</h2>
                <p style="font-size: 3rem; margin: 1rem 0;">$120</p>
                <p>BALCONY VIEW<br>OPEN BAR<br>EXPRESS ENTRY<br>MERCH PACK</p>
                <a href="attendee.html" class="neo-btn btn-black" style="width: 100%; margin-top: 1rem;">BUY NOW</a>
            </div>

            <div class="neo-card" style="background: var(--pop-cyan); text-align: center;">
                <h2 style="color: var(--black);">BACKSTAGE</h2>
                <p style="font-size: 3rem; margin: 1rem 0;">$250</p>
                <p>STAGE ACCESS<br>ARTIST LOUNGE<br>PREMIUM BAR</p>
                <a href="attendee.html" class="neo-btn btn-pink" style="width: 100%; margin-top: 1rem;">BUY NOW</a>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
